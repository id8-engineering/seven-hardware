name: KiBot Quick Start

on:
  pull_request:
    paths:
      - "kicad/*.kicad_sch"
      - "kicad/*.kicad_pcb"
      - ".github/workflows/kibot_quick_start.yml"

jobs:
  quick:
    runs-on: ubuntu-latest
    container: ghcr.io/inti-cmnb/kicad9_auto_full:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2
        with:
          fetch-depth: 0

      - name: Quick Start
        run: |
          cd kicad
          kibot --quick-start

      - name: Retrieve results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: kibot-quick-start-outputs
          path: kicad/Generated
