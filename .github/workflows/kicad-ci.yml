name: KiCad CI

on:
  pull_request:

jobs:
  kicad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 #v6.0.2

      - name: Run KiCad actions
        uses: actions-for-kicad/kicad-actions@fca3500b9e6f6b59634927336416a1cea45729fa #v1.8
        with:
          schematic_file_name: kicad/seven.kicad_sch
          symbol_libraries: "seven_lib=kicad/sym-lib/seven_lib.kicad_sym"
          run_erc: true
          schematic_output_pdf: true

          pcb_file_name: kicad/seven.kicad_pcb
          footprint_libraries: "seven-lib=kicad/fp-lib/seven-fp.pretty"
          run_drc: true
          pcb_output_gerbers_and_drill: true
          pcb_output_image: true

      - name: Upload schematic
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: Schematic
          path: ./schematic.pdf
          archive: false

      - name: Upload gerbers and drill file
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: Gerbers
          path: ./gerbers

      - name: Upload image render
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: PCB-Image
          path: ./pcb.png
          archive: false

      - name: Upload ERC and DRC reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f #v7.0.0
        with:
          name: KiCad-Reports
          path: |
            ./erc.rpt
            ./drc.rpt
          if-no-files-found: warn
